# XcodeGen spec. Generate the Xcode project with:  xcodegen generate
# Then open WoodsWhisper.xcodeproj. See README.md for full setup.
name: WoodsWhisper

options:
  bundleIdPrefix: com.woodswhisper
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  createIntermediateGroups: true

packages:
  WoodsWhisperKit:
    path: Packages/WoodsWhisperKit
  # ML SDKs — iOS/iPadOS only (not watchOS-compatible), so they're attached to the iOS
  # app target rather than the shared package.
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    branch: main
  # Whisper (CoreML) speech models — the smaller variants, selectable alongside Parakeet.
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit.git
    branch: main
  # The reusable LLM/VLM libraries (MLXLLM, MLXLMCommon, MLXHuggingFace, ...) moved out
  # of mlx-swift-examples into this dedicated repo.
  MLXSwiftLM:
    url: https://github.com/ml-explore/mlx-swift-lm.git
    branch: main
  # MLXHuggingFace's load macros expand to code that references AutoTokenizer (Tokenizers)
  # and HubClient (HuggingFace) — neither is bundled by mlx-swift-lm, so we add them.
  SwiftTransformers:
    url: https://github.com/huggingface/swift-transformers.git
    branch: main
  SwiftHuggingFace:
    url: https://github.com/huggingface/swift-huggingface.git
    from: "0.8.1"

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""        # set your team in Xcode, or here for CLI builds

targets:
  # iOS / iPadOS app
  WoodsWhisper:
    type: application
    platform: iOS
    sources:
      - path: Apps/iOS
    dependencies:
      - package: WoodsWhisperKit
      - package: FluidAudio
        product: FluidAudio
      - package: WhisperKit
        product: WhisperKit
      - package: MLXSwiftLM
        product: MLXLLM
      - package: MLXSwiftLM
        product: MLXLMCommon
      - package: MLXSwiftLM
        product: MLXHuggingFace
      - package: SwiftTransformers
        product: Tokenizers
      - package: SwiftHuggingFace
        product: HuggingFace
      - target: WoodsWhisperWatch        # embed the watch app
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.woodswhisper.app
        INFOPLIST_FILE: Apps/iOS/Resources/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"     # iPhone + iPad
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_USER_SCRIPT_SANDBOXING: NO

  # watchOS app (single-target, modern SwiftUI watch app)
  WoodsWhisperWatch:
    type: application
    platform: watchOS
    sources:
      - path: Apps/Watch
    dependencies:
      - package: WoodsWhisperKit
      - target: WoodsWhisperWatchComplication   # embed the "New Recording" complication
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.woodswhisper.app.watchkitapp
        INFOPLIST_FILE: Apps/Watch/Resources/Info.plist
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  # watchOS complication: the bespoke "New Recording" face that starts a recording via the
  # woodswhisper://record deep link.
  WoodsWhisperWatchComplication:
    type: app-extension
    platform: watchOS
    sources:
      - path: Apps/WatchComplication
    dependencies:
      - package: WoodsWhisperKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.woodswhisper.app.watchkitapp.complication
        INFOPLIST_FILE: Apps/WatchComplication/Info.plist
        WATCHOS_DEPLOYMENT_TARGET: "10.0"

# The iOS Lock Screen widget + Control (Apps/iOSWidgets) lives in the repo but is NOT built by
# default — on a free Apple ID the extra app-extension App ID is painful to provision. To enable it,
# re-add a WoodsWhisperWidgets app-extension target (see git history of this file) and give it a
# signing team. The "New Recording" action is still available without it via App Intents (Siri /
# Shortcuts / Action Button / a Lock Screen Shortcut), which need no separate target.

schemes:
  WoodsWhisper:
    build:
      targets:
        WoodsWhisper: all
        WoodsWhisperWatch: all
    run:
      config: Debug
  # Run the watch app directly on an Apple Watch.
  WoodsWhisperWatch:
    build:
      targets:
        WoodsWhisperWatch: all
    run:
      config: Debug
